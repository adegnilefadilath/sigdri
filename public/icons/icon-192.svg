<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Fond bleu SIGDRI -->
  <rect width="192" height="192" rx="32" fill="#1a237e"/>
  <!-- Icône bâtiment industriel en orange -->
  <g transform="translate(32, 28)" stroke="#F97316" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Structure principale -->
    <rect x="10" y="60" width="108" height="72" fill="none"/>
    <!-- Toit en V -->
    <polyline points="4,60 64,10 124,60"/>
    <!-- Fenêtres / portes -->
    <rect x="24" y="80" width="22" height="22" rx="2"/>
    <rect x="82" y="80" width="22" height="22" rx="2"/>
    <!-- Porte centrale -->
    <rect x="47" y="92" width="34" height="40" rx="2"/>
    <!-- Cheminée -->
    <rect x="90" y="20" width="14" height="40" rx="2"/>
    <!-- Fumée stylisée -->
    <path d="M92,18 C92,10 104,10 104,18" stroke-width="4"/>
  </g>
  <!-- Texte SIGDRI -->
  <text x="96" y="174" font-family="Arial, sans-serif" font-size="18" font-weight="900"
        text-anchor="middle" fill="#F97316" letter-spacing="2">SIGDRI</text>
</svg>
