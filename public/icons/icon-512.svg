<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fond bleu SIGDRI -->
  <rect width="512" height="512" rx="80" fill="#1a237e"/>
  <!-- Cercle décoratif légèrement transparent -->
  <circle cx="256" cy="220" r="160" fill="rgba(249,115,22,0.08)"/>
  <!-- Icône bâtiment industriel en orange -->
  <g transform="translate(76, 60)" stroke="#F97316" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Structure principale -->
    <rect x="20" y="160" width="320" height="200" rx="4"/>
    <!-- Toit en V -->
    <polyline points="6,160 180,24 354,160"/>
    <!-- Fenêtres gauche -->
    <rect x="48" y="200" width="68" height="60" rx="4"/>
    <!-- Fenêtres droite -->
    <rect x="244" y="200" width="68" height="60" rx="4"/>
    <!-- Porte centrale -->
    <rect x="138" y="230" width="84" height="130" rx="4"/>
    <!-- Cheminée 1 -->
    <rect x="264" y="50" width="38" height="110" rx="4"/>
    <!-- Cheminée 2 -->
    <rect x="312" y="80" width="28" height="80" rx="4"/>
    <!-- Fumée stylisée -->
    <path d="M268,46 C268,26 300,26 300,46" stroke-width="10"/>
  </g>
  <!-- Texte SIGDRI -->
  <text x="256" y="482" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900"
        text-anchor="middle" fill="#F97316" letter-spacing="6">SIGDRI</text>
</svg>
